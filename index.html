<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoSistemas-V2 | Inicio</title>
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        .welcome-card { max-width: 600px; }
        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        .btn-group a { flex: 1; text-decoration: none; text-align: center; }
        .features { margin-top: 30px; text-align: left; border-top: 1px solid #e0e0e0; padding-top: 20px; }
        .features h3 { color: #003366; margin-bottom: 15px; }
        .features ul { list-style: none; padding-left: 0; }
        .features li { padding: 8px 0; padding-left: 25px; position: relative; }
        .features li:before { content: "✅"; position: absolute; left: 0; }
    </style>
</head>
<body>
    <div class="card welcome-card">
        <div class="logo">
            <h1>🏢 TecnoSistemas-V2</h1>
            <p>Sistema de Gestión de Constancias</p>
        </div>
        <h2>Bienvenido</h2>
        <div class="btn-group">
            <a href="solicitud.html" class="btn-secondary" style="display: inline-block;">🔍 Solicitar Constancia</a>
            <a href="nominas.html" class="btn-primary" style="display: inline-block;">👨‍💼 Panel Admin</a>
        </div>
        <div class="features">
            <h3>Características:</h3>
            <ul>
                <li>📘 Constancias de Estudios</li>
                <li>💼 Constancias de Trabajo</li>
                <li>🔍 Búsqueda por Cédula</li>
                <li>☁️ Base de datos en la nube</li>
                <li>🖨️ Impresión y PDF</li>
            </ul>
        </div>
        <div class="separator"></div>
        <small class="footer-note">TecnoSistemas-V2 - Versión 2.0</small>
    </div>
</body>
</html>
