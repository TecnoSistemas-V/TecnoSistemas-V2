<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Constancia de Trabajo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Times New Roman', Times, serif; background: #e0e0e0; padding: 40px 20px; display: flex; justify-content: center; align-items: center; }
        .hoja { max-width: 800px; margin: auto; background: white; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .contenido { padding: 50px; position: relative; }
        .header { text-align: center; border-bottom: 3px solid #003366; margin-bottom: 30px; padding-bottom: 20px; }

        .titulo-constancia { text-align: center; margin: 30px 0; }
        .titulo-constancia h2 { color: #003366; text-decoration: underline; }
        .cuerpo { margin: 40px 0; line-height: 2; text-align: justify; }
        .cuerpo strong { color: #003366; }
        .footer { margin-top: 60px; text-align: center; }
        .firma-linea { width: 250px; border-top: 1px solid #000; margin: 10px auto; }
        .btn-print { position: fixed; bottom: 20px; right: 20px; background: #003366; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; }
        .btn-print:hover { background: #002244; }
        @media print { body { background: white; padding: 0; } .btn-print { display: none; } }
    </style>
</head>
